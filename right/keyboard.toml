# Documentation: https://rmk.rs/docs/configuration.html
#
# Role: PERIPHERAL[1] / METADE DIREITA (com trackball)
# Hardware: SuperMini nRF52840 (Pro Micro footprint) + Elite-C Holder 2.1
#           + flex PCB TBK Mini (Bastard Keyboards, espelhada vs left)
#           + trackball PMW3360DM via SPI nos pads dedicados do holder
# USB: desligado. Scan de matriz + leitura SPI do sensor + envio BLE para central.
#
# Pinout da matriz — idêntico ao left/keyboard.toml porque:
# - mesma SuperMini (mesmo mapping Pro Micro ↔ nRF)
# - mesmo Elite-C Holder 2.1 plugado com a mesma orientação
# - a flex TBK Mini é fisicamente espelhada, mas o pinout Elite-C → MCU
#   permanece igual; o que muda é a ORDEM das colunas físicas vs lógicas.
#
# Ordem das colunas (IMPORTANTE):
# - No left, col_pins = [C1, C2, C3, C4, C5, C6] (outside → inside) →
#   mapeia pras cols 0-5 do keymap (col_offset=0).
# - No right, a flex espelhada faz C1 físico = OUTSIDE direita e C6 físico =
#   INSIDE direita. O keymap do dongle já tem cols 6-11 na ordem
#   "inside → outside", então col_pins aqui fica em REVERSO do left:
#   [C6, C5, C4, C3, C2, C1] físico → cols 6, 7, 8, 9, 10, 11 do keymap.
# Diodos: ROW2COL (banda preta aponta pra coluna, mesmo schema da left).

[keyboard]
name = "peripheral"
product_name = "Charybdis Right"
vendor_id = 0x4c4b
product_id = 0x4645
manufacturer = "RMK"
chip = "nrf52840"
usb_enable = false

# Mesmo [layout] do dongle e do left — mantém schema compilável.
# A central é quem interpreta o keymap em runtime.
[layout]
rows = 4
cols = 12
layers = 6
keymap = [
    # Layer 0 — Base
    [
        ["Grave",             "Q", "W", "E", "R", "T",                                                 "Y",             "U",             "I",              "O",            "P",                           "Quote"],
        ["Tab",               "A", "MT(S, LCtrl)", "MT(D, LShift)", "MT(F, LAlt)", "MT(G, LGui)",   "MT(H, RGui)", "MT(J, RAlt)", "MT(K, RShift)", "MT(L, RCtrl)", "MT(Semicolon, RCtrl)", "LT(3, Minus)"],
        ["MT(Escape, LCtrl)", "Z", "X", "C", "V", "B",                                            "N",             "M",             "Comma",          "Dot",          "Slash",                       "Backslash"],
        ["No", "MouseBtn1", "No", "LT(2, Backspace)", "LT(1, Space)", "No",                            "No", "No", "LT(2, Enter)", "No", "LT(1, Delete)", "No"],
    ],
    # Layer 1 — Symbols
    [
        ["Escape",  "WM(Kc1, LShift)", "WM(Slash, LShift)", "WM(Kc6, LShift)", "WM(Quote, LShift)", "Quote",                           "Kc7",  "Kc8",  "Kc9", "Minus", "WM(Kc9, LShift)", "WM(Kc0, RShift)"],
        ["KpPlus",  "Grave",           "WM(Kc9, LShift)",   "WM(Kc0, LShift)", "LeftBracket",       "RightBracket",                    "Kc4",  "Kc5",  "Kc6", "Equal", "LeftBracket",     "RightBracket"],
        ["LShift",  "WM(Kc1, LShift)", "WM(Comma, LShift)", "WM(Dot, LShift)", "WM(LeftBracket, LShift)", "WM(RightBracket, LShift)",  "Kc1",  "Kc2",  "Kc3", "Dot",   "WM(LeftBracket, LShift)", "WM(RightBracket, LShift)"],
        ["No", "Macro1", "No", "_", "Macro0", "No",   "No", "No", "_", "No", "Kc0", "No"],
    ],
    # Layer 2 — Nav / F / Media
    [
        ["Escape",      "F1",     "F2",   "F3",   "F4",    "F5",                                    "F6",             "F7",         "F8",         "F9",             "F10",            "F11"],
        ["PrintScreen", "F12",    "Home", "Up",   "End",   "MouseBtn4",                             "AudioMute",           "AudioVolDown", "AudioVolUp",   "MediaNextTrack", "MediaPlayPause", "MediaPrevTrack"],
        ["LCtrl",       "LShift", "Left", "Down", "Right", "MouseBtn5",                             "MouseWheelDown", "MouseBtn1",  "MouseBtn2",  "MouseWheelUp",   "No",             "MouseBtn3"],
        ["No", "CapsLock", "No", "MouseBtn1", "MouseBtn2", "No",   "No", "No", "_", "No", "AudioMute", "No"],
    ],
    # Layer 3 — RGB / Brightness
    [
        ["TO(5)", "No", "No", "No", "No", "No",    "No", "BrightnessUp", "No",   "BrightnessDown", "BrightnessUp", "No"],
        ["No",    "No", "No", "No", "No", "No",    "No", "No",           "No",   "No",             "No",           "No"],
        ["No",    "No", "No", "No", "No", "No",    "No", "No",           "No",   "No",             "No",           "No"],
        ["No", "_", "No", "_", "No", "No",   "No", "No", "No", "No", "_", "No"],
    ],
    # Layer 4 — Mouse
    [
        ["Escape", "No", "No",            "No",        "No",              "No",    "No", "No", "No", "No",         "No",         "No"],
        ["TO(0)",  "No", "No",            "No",        "No",              "No",    "No", "No", "No", "MouseBtn5",  "MouseBtn4",  "No"],
        ["LCtrl",  "No", "MouseWheelUp", "MouseBtn3", "MouseWheelDown", "No",   "MouseWheelDown", "MouseBtn1", "MouseBtn2", "MouseWheelUp", "No", "No"],
        ["No", "Backspace", "No", "MouseBtn1", "MouseBtn2", "No",   "No", "No", "MouseBtn1", "No", "Delete", "No"],
    ],
    # Layer 5 — Gaming
    [
        ["Escape", "Q", "W", "E", "R", "T",                   "Y", "U", "I",     "O",   "P",            "TO(0)"],
        ["Tab",    "A", "S", "D", "F", "G",                   "H", "J", "K",     "L",   "Semicolon",    "LAlt"],
        ["LCtrl",  "Z", "X", "C", "V", "B",                   "N", "M", "Comma", "Dot", "Slash",        "RShift"],
        ["No", "MouseBtn1", "No", "Backspace", "Space", "No",   "No", "No", "Enter", "No", "MouseBtn2", "No"],
    ],
]

[ble]
enabled = true
# Bateria 3.7V LiPo via VDDH (SAADC nRF). Divisor calibrado pro full-swing.
# NOTA: sem default_tx_power aqui — subir TX no peripheral quebra nRF-sdc
# com SuperMini (ver TODO.md § Extensão — Range de RF). TX vem todo do
# dongle via TxPower::P20 no BleConnector.
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806

[split]
connection = "ble"

[split.central]
# Central não tem matriz local (é o dongle ESP32-S3, rows/cols = 0).
rows = 0
cols = 0
row_offset = 0
col_offset = 0
ble_addr = [0xC0, 0xDE, 0xC0, 0xDE, 0x00, 0x01]

# Placeholder exigido por rmk-config 0.6.0 (SplitBoardConfig.matrix não-Option).
# Pinos dummy no formato nRF52840 (compilação com chip = nrf52840). Nunca
# usados — o peripheral não varre a matriz da central.
[split.central.matrix]
matrix_type = "normal"
row_pins = ["P0_28"]
col_pins = ["P0_03"]

# ----------------------------------------------------------------------------
# Peripheral 0 = metade esquerda. Pinos dummy pra satisfazer o schema; este
# firmware (right) não usa a matriz esquerda.
# ----------------------------------------------------------------------------
[[split.peripheral]]
rows = 4
cols = 6
row_offset = 0
col_offset = 0
ble_addr = [0xC0, 0xDE, 0xC0, 0xDE, 0x00, 0x02]

[split.peripheral.matrix]
matrix_type = "normal"
row_pins = ["P0_04", "P0_05", "P0_06", "P0_07"]
col_pins = ["P0_08", "P0_12", "P0_14", "P0_15", "P0_16", "P0_17"]

# ----------------------------------------------------------------------------
# Peripheral 1 = ESTA metade (RIGHT). Pinos REAIS — canônicos do TBK Mini
# idênticos aos do left (mesmo SuperMini + mesmo Elite-C Holder 2.1).
# ORDEM das colunas INVERSA pra bater com col_offset=6 + keymap inside→outside.
# ----------------------------------------------------------------------------
[[split.peripheral]]
rows = 4
cols = 6
row_offset = 0
col_offset = 6
ble_addr = [0xC0, 0xDE, 0xC0, 0xDE, 0x00, 0x03]

[split.peripheral.matrix]
matrix_type = "normal"
row2col = true
# R1..R4 físico → rows do keymap (top → thumb), idêntico ao left.
row_pins = ["P1_15", "P0_24", "P0_22", "P1_06"]
# Colunas em ORDEM REVERSA do left (C6, C5, C4, C3, C2, C1 físicos) →
# mapeia inside → outside no keymap cols 6..11.
# P0.09 é pino NFC; template nRF52840 já tem `nfc-pins-as-gpio`.
col_pins = ["P1_04", "P0_11", "P1_00", "P0_09", "P0_29", "P0_02"]

# ----------------------------------------------------------------------------
# Trackball PMW3360DM via SPI — COMENTADO TEMPORARIAMENTE.
#
# Primeira tentativa (commit 55ed2fc) causou panic loop no peripheral
# (LEDs vermelho + azul piscando) logo após flash. Suspeita: pino CS
# (P0_31/A3) incorreto ou instance SPI3 com conflito — o driver PMW3360
# tenta ler chip ID via SPI no init e, se não receber valor esperado,
# panica antes do peripheral entrar em advertising.
#
# Estratégia de bisect: isolar o problema reativando só a matriz primeiro.
# Se o peripheral conectar e digitar sem esse bloco, confirma que o
# panic é do driver PMW. Aí re-ativa com pinos ajustados.
# [[input_device.pointing]]
# interface = { Spi = { instance = "SPI3", sck = "P1_13", mosi = "P0_28", miso = "P0_03", cs = "P0_31", cpi = 1000 } }
