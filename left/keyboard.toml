# Documentation: https://rmk.rs/docs/configuration.html
#
# Role: PERIPHERAL[0] / METADE ESQUERDA
# Hardware: SuperMini nRF52840 (Pro Micro footprint) + Elite-C Holder 2.1
#           + flex PCB TBK Mini (Bastard Keyboards, CERN-OHL-W v2)
# USB: desligado. Scan de matriz + envio BLE para a central (dongle ESP32-S3).
#
# Pinout canônico TBK Mini → Elite-C Holder 2.1 → SuperMini nRF52840:
#   R1 = Pro Micro A0 (F7) = P0.02
#   R2 = Pro Micro "5" (C6) = P0.24
#   R3 = Pro Micro "4" (D4) = P0.22
#   R4 = Pro Micro "9" (B5) = P1.06
#   C1 = Pro Micro A1 (F6) = P0.29
#   C2 = Pro Micro A2 (F5) = P0.31
#   C3 = Pro Micro "10" (B6) = P1.11
#   C4 = Pro Micro "6" (D7) = P1.00
#   C5 = Pro Micro "7" (E6) = P0.11
#   C6 = Pro Micro "8" (B4) = P1.04
# Fonte: bastardkb-qmk `keyboards/bastardkb/tbkmini/v2/elitec/config.h`
# Diodos: ROW2COL (banda preta aponta pra coluna).

[keyboard]
# Split peripherals: o [[bin]] auto-gerado é `peripheral`.
name = "peripheral"
product_name = "Charybdis Left"
vendor_id = 0x4c4b
product_id = 0x4644
manufacturer = "RMK"
chip = "nrf52840"
usb_enable = false

# Layout idêntico ao do dongle — mantém os três TOMLs compilando contra o
# mesmo schema. A central é quem interpreta o keymap em runtime.
[layout]
rows = 4
cols = 12
layers = 6
keymap = [
    # Layer 0 — Base
    [
        ["Grave",             "Q", "W", "E", "R", "T",                                                 "Y",             "U",             "I",              "O",            "P",                           "Quote"],
        ["Tab",               "A", "MT(S, LCtrl)", "MT(D, LShift)", "MT(F, LAlt)", "MT(G, LGui)",   "MT(H, RGui)", "MT(J, RAlt)", "MT(K, RShift)", "MT(L, RCtrl)", "MT(Semicolon, RCtrl)", "LT(3, Minus)"],
        ["MT(Escape, LCtrl)", "Z", "X", "C", "V", "B",                                            "N",             "M",             "Comma",          "Dot",          "Slash",                       "Backslash"],
        ["No", "MouseBtn1", "No", "LT(2, Backspace)", "LT(1, Space)", "No",                            "No", "No", "LT(2, Enter)", "No", "LT(1, Delete)", "No"],
    ],
    # Layer 1 — Symbols
    [
        ["Escape",  "WM(Kc1, LShift)", "WM(Slash, LShift)", "WM(Kc6, LShift)", "WM(Quote, LShift)", "Quote",                           "Kc7",  "Kc8",  "Kc9", "Minus", "WM(Kc9, LShift)", "WM(Kc0, RShift)"],
        ["KpPlus",  "Grave",           "WM(Kc9, LShift)",   "WM(Kc0, LShift)", "LeftBracket",       "RightBracket",                    "Kc4",  "Kc5",  "Kc6", "Equal", "LeftBracket",     "RightBracket"],
        ["LShift",  "WM(Kc1, LShift)", "WM(Comma, LShift)", "WM(Dot, LShift)", "WM(LeftBracket, LShift)", "WM(RightBracket, LShift)",  "Kc1",  "Kc2",  "Kc3", "Dot",   "WM(LeftBracket, LShift)", "WM(RightBracket, LShift)"],
        ["No", "Macro1", "No", "_", "Macro0", "No",   "No", "No", "_", "No", "Kc0", "No"],
    ],
    # Layer 2 — Nav / F / Media
    [
        ["Escape",      "F1",     "F2",   "F3",   "F4",    "F5",                                    "F6",             "F7",         "F8",         "F9",             "F10",            "F11"],
        ["PrintScreen", "F12",    "Home", "Up",   "End",   "MouseBtn4",                             "AudioMute",           "AudioVolDown", "AudioVolUp",   "MediaNextTrack", "MediaPlayPause", "MediaPrevTrack"],
        ["LCtrl",       "LShift", "Left", "Down", "Right", "MouseBtn5",                             "MouseWheelDown", "MouseBtn1",  "MouseBtn2",  "MouseWheelUp",   "No",             "MouseBtn3"],
        ["No", "CapsLock", "No", "MouseBtn1", "MouseBtn2", "No",   "No", "No", "_", "No", "AudioMute", "No"],
    ],
    # Layer 3 — RGB / Brightness
    [
        ["TO(5)", "No", "No", "No", "No", "No",    "No", "BrightnessUp", "No",   "BrightnessDown", "BrightnessUp", "No"],
        ["No",    "No", "No", "No", "No", "No",    "No", "No",           "No",   "No",             "No",           "No"],
        ["No",    "No", "No", "No", "No", "No",    "No", "No",           "No",   "No",             "No",           "No"],
        ["No", "_", "No", "_", "No", "No",   "No", "No", "No", "No", "_", "No"],
    ],
    # Layer 4 — Mouse
    [
        ["Escape", "No", "No",            "No",        "No",              "No",    "No", "No", "No", "No",         "No",         "No"],
        ["TO(0)",  "No", "No",            "No",        "No",              "No",    "No", "No", "No", "MouseBtn5",  "MouseBtn4",  "No"],
        ["LCtrl",  "No", "MouseWheelUp", "MouseBtn3", "MouseWheelDown", "No",   "MouseWheelDown", "MouseBtn1", "MouseBtn2", "MouseWheelUp", "No", "No"],
        ["No", "Backspace", "No", "MouseBtn1", "MouseBtn2", "No",   "No", "No", "MouseBtn1", "No", "Delete", "No"],
    ],
    # Layer 5 — Gaming
    [
        ["Escape", "Q", "W", "E", "R", "T",                   "Y", "U", "I",     "O",   "P",            "TO(0)"],
        ["Tab",    "A", "S", "D", "F", "G",                   "H", "J", "K",     "L",   "Semicolon",    "LAlt"],
        ["LCtrl",  "Z", "X", "C", "V", "B",                   "N", "M", "Comma", "Dot", "Slash",        "RShift"],
        ["No", "MouseBtn1", "No", "Backspace", "Space", "No",   "No", "No", "Enter", "No", "MouseBtn2", "No"],
    ],
]

[ble]
enabled = true
# Bateria 3.7V LiPo via VDDH (SAADC nRF). Divisor calibrado pro full-swing.
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806

[split]
connection = "ble"

[split.central]
# Central não tem matriz local (é o dongle ESP32-S3, rows/cols = 0).
rows = 0
cols = 0
row_offset = 0
col_offset = 0
ble_addr = [0xC0, 0xDE, 0xC0, 0xDE, 0x00, 0x01]

# Placeholder exigido por rmk-config 0.6.0. Pinos dummy no formato nRF52840
# (compilação acontece com chip = nrf52840). Nunca usados — o peripheral
# não varre a matriz da central; só precisa do BLE addr dela.
[split.central.matrix]
matrix_type = "normal"
row_pins = ["P0_28"]
col_pins = ["P0_03"]

# ----------------------------------------------------------------------------
# Peripheral 0 = ESTA metade (LEFT). Pinos REAIS — canônicos do TBK Mini.
# ----------------------------------------------------------------------------
[[split.peripheral]]
rows = 4
cols = 6
row_offset = 0
col_offset = 0
ble_addr = [0xC0, 0xDE, 0xC0, 0xDE, 0x00, 0x02]

[split.peripheral.matrix]
matrix_type = "normal"
# TBK Mini tem diodos ROW2COL (banda preta na coluna). Default do RMK é
# col2row — drive col, read row. Com row2col=true, RMK inverte: drive row,
# read col. `row_pins` e `col_pins` mantêm a semântica de "pinos ligados
# às linhas/colunas da matriz" — não precisa trocá-los.
row2col = true
# TBK Mini R1..R4 em ordem de linha (top → thumb).
row_pins = ["P0_02", "P0_24", "P0_22", "P1_06"]
# TBK Mini C1..C6 em ordem (outside → inside).
col_pins = ["P0_29", "P0_31", "P1_11", "P1_00", "P0_11", "P1_04"]

# ----------------------------------------------------------------------------
# Peripheral 1 = metade direita. Pinos dummy pra satisfazer o schema; este
# firmware (left) não usa a matriz direita.
# ----------------------------------------------------------------------------
[[split.peripheral]]
rows = 4
cols = 6
row_offset = 0
col_offset = 6
ble_addr = [0xC0, 0xDE, 0xC0, 0xDE, 0x00, 0x03]

[split.peripheral.matrix]
matrix_type = "normal"
row_pins = ["P0_04", "P0_05", "P0_06", "P0_07"]
col_pins = ["P0_08", "P0_12", "P0_14", "P0_15", "P0_16", "P0_17"]
