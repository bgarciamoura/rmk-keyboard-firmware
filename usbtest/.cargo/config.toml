[target.'cfg(all(any(target_arch = "riscv32", target_arch = "xtensa"), target_os = "none"))']
runner = "espflash flash --monitor"

[build]
target = "xtensa-esp32s3-none-elf"

rustflags = [
  # linkall.x é fornecido pelo build.rs do esp-hal; sem ele, símbolos de
  # peripherals (UART0, I2S0, LCD_CAM...) ficam não-resolvidos no link.
  "-C", "link-arg=-Tlinkall.x",
  "-C", "force-frame-pointers",
]

[env]
ESP_LOG = "debug"

# Xtensa only: needed until LLVM upstream tem suporte Rust Xtensa completo.
[unstable]
build-std = ["alloc", "core"]
