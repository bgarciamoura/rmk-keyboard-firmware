[target.'cfg(all(any(target_arch = "riscv32", target_arch = "xtensa"), target_os = "none"))']
runner = "espflash flash --monitor"

[build]
target = "xtensa-esp32s3-none-elf"

rustflags = [
  # Required to obtain backtraces (e.g. when using the "esp-backtrace" crate.)
  # NOTE: May negatively impact performance of produced code
  "-C", "force-frame-pointers",
]

[env]
ESP_LOG = "info"
# A macro #[rmk_keyboard] lê o caminho do keyboard.toml via esta env var em
# tempo de compilação. `relative = true` resolve a partir da raiz do crate
# (onde este .cargo/ está — ou seja, dongle/).
KEYBOARD_TOML_PATH = { value = "keyboard.toml", relative = true }
VIAL_JSON_PATH = { value = "vial.json", relative = true }

# Xtensa only:
# Needed for nightly, until llvm upstream has support for Rust Xtensa.
[unstable]
build-std = ["alloc", "core"]
