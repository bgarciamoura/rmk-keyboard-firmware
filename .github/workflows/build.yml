name: Build RMK firmware
on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  # -------------------------------------------------------------------------
  # Dongle (ESP32-S3 central): usa o workflow upstream `user_build.yml`,
  # que compila qualquer TOML padrão (central + peripherals implícitos).
  # -------------------------------------------------------------------------
  build-dongle:
    name: build-dongle
    uses: haobogu/rmk/.github/workflows/user_build.yml@main
    with:
      keyboard_toml_path: dongle/keyboard.toml
      vial_json_path: dongle/vial.json

  # -------------------------------------------------------------------------
  # Left peripheral (nRF52840): o template rmkit gera DOIS bins
  # (`central` + `peripheral`) no mesmo projeto. Como nosso central roda em
  # outro chip (ESP32-S3), o bin `central` do template nRF quebra (rows=0,
  # usb_enable=false batem mal com o macro `#[rmk_central]`). Workaround:
  # rodar `cargo make uf2-peripheral --release` que só compila o bin
  # peripheral e ignora o central.
  # -------------------------------------------------------------------------
  build-left:
    name: build-left
    runs-on: ubuntu-latest
    env:
      LIBSSL: "libssl1.1_1.1.1f-1ubuntu2_amd64.deb"
      RUST_MIN_STACK: "67108864"
    steps:
      - uses: cargo-bins/cargo-binstall@main
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            libssl*.deb
          key: ${{ runner.os }}-libssl
      - name: Install libssl
        run: |
          [ ! -f $LIBSSL ] && wget http://nz2.archive.ubuntu.com/ubuntu/pool/main/o/openssl/$LIBSSL
          sudo dpkg -i $LIBSSL
      - name: Install rmkit, flip-link and cargo-make
        run: cargo binstall cargo-make rmkit flip-link -y
      - name: Create firmware project (scaffold from left/keyboard.toml)
        run: rmkit create --keyboard-toml-path left/keyboard.toml --vial-json-path dongle/vial.json --version main --target-dir rmk-left
      - name: Patch Cargo.toml (remove bin central + desabilita async_matrix)
        # Duas edições no Cargo.toml gerado pelo rmkit:
        # 1. Remove o bloco [[bin]] do central (nosso central é ESP32-S3, não
        #    nRF). Sem isso, `cargo build --release` tenta compilar
        #    `#[rmk_central]` com config de peripheral e quebra.
        # 2. Remove a feature `async_matrix` — essa feature usa GPIOTE
        #    interrupts pra acordar do deep sleep no keypress, mas com
        #    ROW2COL a direção do edge fica errada e o wake-up não
        #    dispara. Sintoma: peripheral dorme em segundos, aparece
        #    "connected" na central mas nenhuma tecla registra; só RST
        #    resolve. Sem a feature, matrix faz polling contínuo — mais
        #    consumo de bateria (~5mA vs ~1mA), mas 100% responsivo.
        #    A "instabilidade BLE" que antes coincidiu com disable era
        #    outro bug: conn params agressivos do upstream RMK, já
        #    patchados em build-f2.yml (interval 15ms, latency 4,
        #    supervision 30s).
        run: |
          python3 - <<'EOF'
          import re
          from pathlib import Path
          path = Path("rmk-left/Cargo.toml")
          content = path.read_text()

          # Fix 1: Remove [[bin]] central
          new = re.sub(
              r'\[\[bin\]\]\s*\n\s*name\s*=\s*"central"\s*\n\s*path\s*=\s*"src/central\.rs"\s*\n',
              '',
              content,
          )
          assert new != content, "Padrão do bin central não encontrado no Cargo.toml"

          # Fix 2: Remove feature async_matrix da lista de features do rmk
          new2 = re.sub(r'\n\s*"async_matrix",?\s*', '\n', new)
          assert new2 != new, "Feature async_matrix não encontrada no Cargo.toml"

          path.write_text(new2)
          Path("rmk-left/src/central.rs").unlink(missing_ok=True)
          print("OK — bin central removido + async_matrix desabilitado")
          EOF
      - name: Vendor + patch RMK (break no write error do peripheral pra reconnect)
        # O loop do split peripheral em `rmk/src/split/peripheral.rs` silencia
        # erros de notify GATT via `.write(&e).await.ok();` (linha ~173 do main
        # upstream). Quando o link BLE fica zumbi — link-layer "connected" mas
        # GATT notifications não chegam mais no central (observado após ~30s
        # de ociosidade; causa suspeita: controller-level BLE supervision do
        # esp-radio no ESP32-S3 OU CCCD stale após idle) — o peripheral fica
        # tentando TX indefinidamente sem nunca detectar o problema, e só
        # replug USB restaura o link.
        #
        # Fix: substituir `.ok()` por tratamento que faz `break` no erro,
        # saindo do loop e deixando o wrapper externo disparar reconnect
        # (mesmo caminho que já existe pra `SplitDriverError::Disconnected`
        # no read — veja case Err(e) acima no mesmo arquivo).
        #
        # Impacto colateral: erros transitórios de write também disparam
        # reconnect. Reconnect típico nRF52840 ≈ 500ms-2s. Aceitável trade-off
        # vs link zumbi permanente.
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/HaoboGu/rmk.git /tmp/rmk-vendored
          python3 - <<'PYEOF'
          from pathlib import Path
          p = Path("/tmp/rmk-vendored/rmk/src/split/peripheral.rs")
          src = p.read_text()
          old = "                        self.split_driver.write(&e).await.ok();"
          new = (
              "                        if let Err(err) = self.split_driver.write(&e).await {\n"
              "                            error!(\"Split write failed, breaking to reconnect: {:?}\", err);\n"
              "                            break;\n"
              "                        }"
          )
          assert old in src, "Padrão '.write(&e).await.ok();' não encontrado — upstream mudou"
          src = src.replace(old, new)
          p.write_text(src)
          print("OK peripheral.rs: write() error agora faz break → reconnect")
          PYEOF
          cat >> rmk-left/Cargo.toml <<'EOF'

          # Patch injetado pelo CI — NÃO commitar manualmente.
          [patch."https://github.com/HaoboGu/rmk"]
          rmk        = { path = "/tmp/rmk-vendored/rmk" }
          rmk-config = { path = "/tmp/rmk-vendored/rmk-config" }
          rmk-macro  = { path = "/tmp/rmk-vendored/rmk-macro" }
          rmk-types  = { path = "/tmp/rmk-vendored/rmk-types" }
          EOF
      - name: Build peripheral.uf2 (isolated — só o bin peripheral)
        working-directory: ./rmk-left
        run: cargo make uf2-peripheral --release
      - name: Upload peripheral.uf2
        uses: actions/upload-artifact@v7
        with:
          name: firmware_left_uf2
          path: rmk-left/*-peripheral.uf2

  # -------------------------------------------------------------------------
  # Right peripheral (nRF52840 + trackball PMW3360): espelho do build-left com
  # right/keyboard.toml + mesmos dois patches (remove bin central, desabilita
  # async_matrix, break-on-write-error no split peripheral.rs do RMK vendored).
  # -------------------------------------------------------------------------
  build-right:
    name: build-right
    runs-on: ubuntu-latest
    env:
      LIBSSL: "libssl1.1_1.1.1f-1ubuntu2_amd64.deb"
      RUST_MIN_STACK: "67108864"
    steps:
      - uses: cargo-bins/cargo-binstall@main
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            libssl*.deb
          key: ${{ runner.os }}-libssl
      - name: Install libssl
        run: |
          [ ! -f $LIBSSL ] && wget http://nz2.archive.ubuntu.com/ubuntu/pool/main/o/openssl/$LIBSSL
          sudo dpkg -i $LIBSSL
      - name: Install rmkit, flip-link and cargo-make
        run: cargo binstall cargo-make rmkit flip-link -y
      - name: Create firmware project (scaffold from right/keyboard.toml)
        run: rmkit create --keyboard-toml-path right/keyboard.toml --vial-json-path dongle/vial.json --version main --target-dir rmk-right
      - name: Patch Cargo.toml (remove bin central + desabilita async_matrix)
        # Mesma lógica do build-left: remove bin central (não compila no
        # contexto peripheral) + remove feature async_matrix (incompat com
        # row2col = true no template rmkit pra nRF52840).
        run: |
          python3 - <<'EOF'
          import re
          from pathlib import Path
          path = Path("rmk-right/Cargo.toml")
          content = path.read_text()

          # Fix 1: Remove [[bin]] central
          new = re.sub(
              r'\[\[bin\]\]\s*\n\s*name\s*=\s*"central"\s*\n\s*path\s*=\s*"src/central\.rs"\s*\n',
              '',
              content,
          )
          assert new != content, "Padrão do bin central não encontrado no Cargo.toml"

          # Fix 2: Remove feature async_matrix da lista de features do rmk
          new2 = re.sub(r'\n\s*"async_matrix",?\s*', '\n', new)
          assert new2 != new, "Feature async_matrix não encontrada no Cargo.toml"

          path.write_text(new2)
          Path("rmk-right/src/central.rs").unlink(missing_ok=True)
          print("OK — bin central removido + async_matrix desabilitado")
          EOF
      - name: Force peripheral id=1 for right half
        # O template rmk-template/nrf52840_split/src/peripheral.rs é hardcoded
        # com `#[rmk_peripheral(id = 0)]`. Não há campo TOML nem flag rmkit pra
        # mudar isso — o id define o byte do ManufacturerSpecificData no BLE
        # advertisement que o central usa pra distinguir os peripherals.
        # Sem patch: right advertises como id=0, dongle reconhece como left.
        # Assert defensivo: se o upstream mudar o formato da macro, CI falha
        # com mensagem clara em vez de silenciosamente produzir um binário
        # right com id=0 que colide com left.
        run: |
          set -euo pipefail
          sed -i 's/rmk_peripheral(id = 0)/rmk_peripheral(id = 1)/' rmk-right/src/peripheral.rs
          if ! grep -q 'rmk_peripheral(id = 1)' rmk-right/src/peripheral.rs; then
            echo "ERRO: sed não aplicou — formato da macro rmk_peripheral mudou no template?"
            grep 'rmk_peripheral' rmk-right/src/peripheral.rs || true
            exit 1
          fi
          echo "OK — right peripheral configurado com id=1"
      - name: Vendor + patch RMK (break no write error do peripheral pra reconnect)
        # Mesma correção aplicada no build-left: `.write(&e).await.ok();` em
        # `rmk/src/split/peripheral.rs:173` silencia erros de notify GATT e
        # gera link zumbi após idle. Substituir por tratamento que dá break
        # no Err pra disparar reconnect via o wrapper externo.
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/HaoboGu/rmk.git /tmp/rmk-vendored
          python3 - <<'PYEOF'
          from pathlib import Path
          p = Path("/tmp/rmk-vendored/rmk/src/split/peripheral.rs")
          src = p.read_text()
          old = "                        self.split_driver.write(&e).await.ok();"
          new = (
              "                        if let Err(err) = self.split_driver.write(&e).await {\n"
              "                            error!(\"Split write failed, breaking to reconnect: {:?}\", err);\n"
              "                            break;\n"
              "                        }"
          )
          assert old in src, "Padrão '.write(&e).await.ok();' não encontrado — upstream mudou"
          src = src.replace(old, new)
          p.write_text(src)
          print("OK peripheral.rs: write() error agora faz break → reconnect")
          PYEOF
          cat >> rmk-right/Cargo.toml <<'EOF'

          # Patch injetado pelo CI — NÃO commitar manualmente.
          [patch."https://github.com/HaoboGu/rmk"]
          rmk        = { path = "/tmp/rmk-vendored/rmk" }
          rmk-config = { path = "/tmp/rmk-vendored/rmk-config" }
          rmk-macro  = { path = "/tmp/rmk-vendored/rmk-macro" }
          rmk-types  = { path = "/tmp/rmk-vendored/rmk-types" }
          EOF
      - name: Build peripheral.uf2 (isolated — só o bin peripheral)
        working-directory: ./rmk-right
        run: cargo make uf2-peripheral --release
      - name: Upload peripheral.uf2
        uses: actions/upload-artifact@v7
        with:
          name: firmware_right_uf2
          path: rmk-right/*-peripheral.uf2
