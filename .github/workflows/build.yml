name: Build RMK firmware
on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: dongle
            toml: dongle/keyboard.toml
            vial: dongle/vial.json
          # Metade esquerda — habilitada 2026-04-21 (PCB soldada, Elite-C Holder
          # 2.1 + flex TBK Mini + SuperMini nRF52840, pinout canônico Bastard).
          - role: left
            toml: left/keyboard.toml
            vial: dongle/vial.json
          # Metade direita — ainda em espera até o hardware ser montado.
          # - role: right
          #   toml: right/keyboard.toml
          #   vial: dongle/vial.json
    name: build-${{ matrix.role }}
    uses: haobogu/rmk/.github/workflows/user_build.yml@main
    with:
      keyboard_toml_path: ${{ matrix.toml }}
      vial_json_path: ${{ matrix.vial }}
