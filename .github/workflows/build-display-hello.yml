name: display_hello — texto via embedded-graphics

on:
  workflow_dispatch:
  push:
    paths:
      - "dongle/src/bin/display_hello.rs"
      - "dongle/Cargo.toml"
      - ".github/workflows/build-display-hello.yml"

jobs:
  build-display-hello:
    name: build-display-hello (JD9853 + embedded-graphics)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dongle
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dongle -> target
          shared-key: esp32s3-display-hello
          cache-on-failure: true

      - name: Install ESP Xtensa toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          ldproxy: true
          default: true
          buildtargets: esp32s3

      - name: Install espflash
        run: cargo install espflash --locked

      - name: Build display_hello (release)
        run: cargo build --release --bin display_hello

      - name: Produce flashable merged image
        run: |
          espflash save-image \
            --chip esp32s3 \
            --merge \
            target/xtensa-esp32s3-none-elf/release/display_hello \
            display_hello.bin

      - name: Upload display_hello.bin
        uses: actions/upload-artifact@v4
        with:
          name: display-hello-bin
          path: dongle/display_hello.bin
