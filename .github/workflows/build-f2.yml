name: F2 — Build dongle (Rust/cargo)
#
# Workflow paralelo ao build.yml (F1 config-only). Ambos rodam em cada push
# enquanto F2 amadurece. Quando estável, o build.yml é substituído por este
# conteúdo e o build-f2.yml é removido.

on:
  workflow_dispatch:
  push:
    paths:
      - "dongle/**"
      - ".github/workflows/build-f2.yml"

jobs:
  build-dongle-f2:
    name: build-dongle (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dongle
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dongle -> target
          shared-key: esp32s3-f2
          cache-on-failure: true

      - name: Install ESP Xtensa toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          ldproxy: true
          default: true
          buildtargets: esp32s3

      - name: Install espflash
        run: cargo install espflash --locked

      - name: Vendor + patch RMK (latency=0 em todos os presets + queue GATT 8)
        # Três correções no RMK upstream pra estabilidade do link split BLE
        # (sintomas anteriores: ~2s de latência inicial, teclas travadas,
        # drops intermitentes).
        #
        # 1) max_latency: N → 0 em TODAS as ocorrências de central.rs
        #    (regex cobre os 3 presets: default, sleep-connected-to-host,
        #    sleep-advertising). ZMK best practice: slave_latency = 0 no
        #    link split — peripheral RMK não tem queue persistente e precisa
        #    enviar key events no próximo conn event. Latency > 0 força
        #    delay e o central interpreta como idle profundo, disparando
        #    ~2s de reconexão ao voltar atividade.
        #
        # 2) interval 7.5ms e supervision 5s ficam como upstream (default).
        #    Patch anterior (5ffc535) subia pra 15ms/30s, otimizando pro
        #    peripheral em sleep (bateria). No link ativo (USB), é o caso
        #    errado de otimização.
        #
        # 3) gatt-client-notification-queue-size-4 → size-8 em rmk/Cargo.toml.
        #    Queue de 4 notifications GATT satura em rajada (>4 eventos
        #    key-down/up antes do central drenar) → key-up perdido = tecla
        #    travada. +200 B de RAM, throughput dobrado.
        #
        # Histórico de tentativas anteriores (não repetir):
        # - max_latency=0 + async_matrix ON + interval 7.5ms (7c47edb):
        #   peripheral dormia e não sustentava TX → disconnect loop.
        #   Com async_matrix OFF (HEAD atual), peripheral fica sempre
        #   acordado e aguenta responder em todo event → latency 0 passa
        #   a ser seguro.
        # - interval 15ms / latency 4 / supervision 30s (5ffc535):
        #   atenuou drops em sleep mas introduziu os ~2s de delay inicial.
        working-directory: .
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/HaoboGu/rmk.git /tmp/rmk-vendored
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          # --- Patch 1: central.rs — max_latency: N → 0 em todos os presets
          p = Path("/tmp/rmk-vendored/rmk/src/split/ble/central.rs")
          src = p.read_text()
          patched, count = re.subn(r"max_latency:\s*[1-9]\d*", "max_latency: 0", src)
          assert count >= 1, "Nenhum max_latency não-zero encontrado em central.rs — estrutura mudou"
          residual = re.findall(r"max_latency:\s*(\d+)", patched)
          non_zero = [v for v in residual if v != "0"]
          assert not non_zero, f"Sobraram max_latency não-zero: {non_zero}"
          p.write_text(patched)
          print(f"OK central.rs: {count} ocorrência(s) de max_latency: N → 0")

          # --- Patch 2: rmk/Cargo.toml — queue GATT 4 → 8
          cp = Path("/tmp/rmk-vendored/rmk/Cargo.toml")
          csrc = cp.read_text()
          needle = "gatt-client-notification-queue-size-4"
          assert needle in csrc, f"{needle} ausente em rmk/Cargo.toml"
          cp.write_text(csrc.replace(needle, "gatt-client-notification-queue-size-8"))
          print("OK Cargo.toml: gatt-client-notification-queue-size 4 → 8")

          # --- Patch 3: central.rs — SEMPRE parar scan antes de connect
          #
          # Documentação oficial Espressif confirma (ESP-IDF BLE multiconn guide
          # + issue esp-idf#826): "Connect, scan and advertise can't occupy
          # radio at the same time. You MUST explicitly call the stop scanning
          # function before attempting to connect to each peripheral." Sem
          # isso, controller btdm retorna GATT_BUSY/ERROR ou simplesmente
          # trava. No nRF-SDC (exemplo nrf52840_ble_split_dongle) isso é
          # tolerado, por isso upstream não força stop scan no happy path.
          #
          # Código original:
          #   if let Ok(_guard) = SCANNING_MUTEX.try_lock() {
          #       central.connect(...).await
          #   } else {
          #       STOP_SCANNING.signal(());
          #       let _guard = SCANNING_MUTEX.lock().await;
          #       Timer::after_millis(100).await;
          #       central.connect(...).await
          #   }
          #
          # O problema é o caminho `try_lock` — quando o mutex está disponível
          # (e.g., scan está inativo naquele exato instante mas a flag interna
          # do controller ainda não propagou), pula stop-scan e chama connect
          # com o radio "ainda cheirando a scan". No ESP32-S3 btdm isso trava.
          #
          # Fix: remover o happy path do try_lock. SEMPRE sinalizar STOP_SCANNING
          # e aguardar o lock + 200ms de settle. Custo: boot do primeiro
          # peripheral é 100-200ms mais lento (insignificante no uso humano).
          p2 = Path("/tmp/rmk-vendored/rmk/src/split/ble/central.rs")
          src2 = p2.read_text()
          old = (
              "            if let Ok(_guard) = SCANNING_MUTEX.try_lock() {\n"
              "                info!(\"Start connecting to peripheral {}\", peri_id);\n"
              "                central.connect(&config).await\n"
              "            } else {\n"
              "                STOP_SCANNING.signal(());\n"
              "                let _guard = SCANNING_MUTEX.lock().await;\n"
              "                // Wait a little bit to ensure that the scanning has been fully stopped\n"
              "                embassy_time::Timer::after_millis(100).await;\n"
              "                info!(\"Start connecting to peripheral {}\", peri_id);\n"
              "                central.connect(&config).await\n"
              "            }\n"
          )
          # DIAG: logs em cada stage pra identificar onde o executor trava
          # no ESP32-S3 quando o 2º peripheral conecta. Cada info!() imprime
          # peri_id + stage_num pra serial (espflash monitor). Quando travar,
          # a última linha do serial indica a STAGE onde parou.
          new = (
              "            info!(\"[DIAG] peri {} STAGE 1: signaling STOP_SCANNING\", peri_id);\n"
              "            STOP_SCANNING.signal(());\n"
              "            info!(\"[DIAG] peri {} STAGE 2: acquiring SCANNING_MUTEX\", peri_id);\n"
              "            let _guard = SCANNING_MUTEX.lock().await;\n"
              "            info!(\"[DIAG] peri {} STAGE 3: mutex acquired, settle 200ms\", peri_id);\n"
              "            embassy_time::Timer::after_millis(200).await;\n"
              "            info!(\"[DIAG] peri {} STAGE 4: calling central.connect()\", peri_id);\n"
              "            let __diag_conn_result = central.connect(&config).await;\n"
              "            info!(\"[DIAG] peri {} STAGE 5: central.connect() returned\", peri_id);\n"
              "            __diag_conn_result\n"
          )
          assert old in src2, "Padrão do try_lock/else SCANNING_MUTEX não encontrado — upstream mudou"
          p2.write_text(src2.replace(old, new))
          print("OK central.rs: DIAG — logs por stage inseridos antes/depois de central.connect()")

          # DIAG: logs adicionais em volta do run_central_manager_task
          # (pós-connect, onde GATT discovery acontece)
          old_post = (
              "                if let Err(e) =\n"
              "                    run_central_manager_task::<_, _, ROW, COL, ROW_OFFSET, COL_OFFSET>(peri_id, stack, &conn).await\n"
              "                {\n"
          )
          new_post = (
              "                info!(\"[DIAG] peri {} STAGE 6: entering run_central_manager_task\", peri_id);\n"
              "                let __diag_mgr = run_central_manager_task::<_, _, ROW, COL, ROW_OFFSET, COL_OFFSET>(peri_id, stack, &conn).await;\n"
              "                info!(\"[DIAG] peri {} STAGE 7: run_central_manager_task returned\", peri_id);\n"
              "                if let Err(e) = __diag_mgr\n"
              "                {\n"
          )
          assert old_post in src2 or old_post in p2.read_text(), "Padrão do run_central_manager_task não encontrado"
          current = p2.read_text()
          p2.write_text(current.replace(old_post, new_post))
          print("OK central.rs: DIAG — logs stage 6/7 inseridos em volta de run_central_manager_task")
          PYEOF
          cat >> dongle/Cargo.toml <<'EOF'

          # Patch injetado pelo CI — NÃO commitar manualmente.
          [patch."https://github.com/HaoboGu/rmk"]
          rmk        = { path = "/tmp/rmk-vendored/rmk" }
          rmk-config = { path = "/tmp/rmk-vendored/rmk-config" }
          rmk-macro  = { path = "/tmp/rmk-vendored/rmk-macro" }
          rmk-types  = { path = "/tmp/rmk-vendored/rmk-types" }
          EOF

      - name: Build firmware (release)
        run: cargo build --release

      - name: Produce flashable image
        run: |
          espflash save-image \
            --chip esp32s3 \
            --merge \
            target/xtensa-esp32s3-none-elf/release/central \
            dongle.bin

      - name: Upload dongle.bin
        uses: actions/upload-artifact@v4
        with:
          name: dongle-f2-bin
          path: dongle/dongle.bin
