name: F2 — Build dongle (Rust/cargo)
#
# Workflow paralelo ao build.yml (F1 config-only). Ambos rodam em cada push
# enquanto F2 amadurece. Quando estável, o build.yml é substituído por este
# conteúdo e o build-f2.yml é removido.

on:
  workflow_dispatch:
  push:
    paths:
      - "dongle/**"
      - ".github/workflows/build-f2.yml"

jobs:
  build-dongle-f2:
    name: build-dongle (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dongle
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dongle -> target
          shared-key: esp32s3-f2
          cache-on-failure: true

      - name: Install ESP Xtensa toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          ldproxy: true
          default: true
          buildtargets: esp32s3

      - name: Install espflash
        run: cargo install espflash --locked

      - name: Vendor + patch RMK (conn params estáveis pro split BLE)
        # RMK main hardcoda defaults agressivos que quebram peripheral BLE
        # em configurações reais:
        #   min/max interval = 7.5ms (frágil com interferência 2.4GHz)
        #   max_latency = 30         (225ms delay worst-case)
        #   supervision_timeout = 5s (peripheral em deep sleep não manda
        #                             keepalive suficiente → link drop)
        #
        # Patch aplicado:
        #   min/max interval = 15ms   (+60ms tolerância no rádio)
        #   max_latency = 4           (60ms delay worst-case, imperceptível)
        #   supervision_timeout = 30s (peripheral pode dormir 30s sem drop)
        #
        # Histórico de tentativas (não repetir):
        # - max_latency=0: peripheral não sustenta TX em todo 7.5ms event,
        #   causa disconnect/reconnect loop
        # - supervision 5s + async_matrix ON: peripheral dorme, nrf-sdc não
        #   manda keepalive suficiente, central dropa em idle
        working-directory: .
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/HaoboGu/rmk.git /tmp/rmk-vendored
          python3 - <<'PYEOF'
          from pathlib import Path
          p = Path("/tmp/rmk-vendored/rmk/src/split/ble/central.rs")
          src = p.read_text()
          s1 = src.replace(
              "min_connection_interval: Duration::from_micros(7500)",
              "min_connection_interval: Duration::from_micros(15000)",
          )
          assert s1 != src, "min interval 7500 não encontrado"
          s2 = s1.replace(
              "max_connection_interval: Duration::from_micros(7500)",
              "max_connection_interval: Duration::from_micros(15000)",
          )
          assert s2 != s1, "max interval 7500 não encontrado"
          s3 = s2.replace("max_latency: 30", "max_latency: 4")
          assert s3 != s2, "max_latency: 30 não encontrado"
          s4 = s3.replace(
              "supervision_timeout: Duration::from_secs(5)",
              "supervision_timeout: Duration::from_secs(30)",
          )
          assert s4 != s3, "supervision 5s não encontrado"
          p.write_text(s4)
          print("OK — interval 7.5→15ms, max_latency 30→4, supervision 5→30s")
          PYEOF
          cat >> dongle/Cargo.toml <<'EOF'

          # Patch injetado pelo CI — NÃO commitar manualmente.
          [patch."https://github.com/HaoboGu/rmk"]
          rmk        = { path = "/tmp/rmk-vendored/rmk" }
          rmk-config = { path = "/tmp/rmk-vendored/rmk-config" }
          rmk-macro  = { path = "/tmp/rmk-vendored/rmk-macro" }
          rmk-types  = { path = "/tmp/rmk-vendored/rmk-types" }
          EOF

      - name: Build firmware (release)
        run: cargo build --release

      - name: Produce flashable image
        run: |
          espflash save-image \
            --chip esp32s3 \
            --merge \
            target/xtensa-esp32s3-none-elf/release/central \
            dongle.bin

      - name: Upload dongle.bin
        uses: actions/upload-artifact@v4
        with:
          name: dongle-f2-bin
          path: dongle/dongle.bin
