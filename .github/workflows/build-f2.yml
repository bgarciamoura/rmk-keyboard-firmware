name: F2 — Build dongle (Rust/cargo)
#
# Workflow paralelo ao build.yml (F1 config-only). Ambos rodam em cada push
# enquanto F2 amadurece. Quando estável, o build.yml é substituído por este
# conteúdo e o build-f2.yml é removido.

on:
  workflow_dispatch:
  push:
    paths:
      - "dongle/**"
      - ".github/workflows/build-f2.yml"

jobs:
  build-dongle-f2:
    name: build-dongle (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dongle
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dongle -> target
          shared-key: esp32s3-f2
          cache-on-failure: true

      - name: Install ESP Xtensa toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          ldproxy: true
          default: true
          buildtargets: esp32s3

      - name: Install espflash
        run: cargo install espflash --locked

      - name: Vendor + patch RMK (latency=0 + queue GATT 8 + CONNECT_MUTEX)
        # Quatro correções no RMK upstream pra estabilidade do link split BLE
        # (sintomas anteriores: ~2s de latência inicial, teclas travadas,
        # drops intermitentes, e freeze total ao ligar ambos peripherals
        # simultaneamente).
        #
        # 1) max_latency: N → 0 em TODAS as ocorrências de central.rs
        #    (regex cobre os 3 presets: default, sleep-connected-to-host,
        #    sleep-advertising). ZMK best practice: slave_latency = 0 no
        #    link split — peripheral RMK não tem queue persistente e precisa
        #    enviar key events no próximo conn event. Latency > 0 força
        #    delay e o central interpreta como idle profundo, disparando
        #    ~2s de reconexão ao voltar atividade.
        #
        # 2) interval 7.5ms e supervision 5s ficam como upstream (default).
        #    Patch anterior (5ffc535) subia pra 15ms/30s, otimizando pro
        #    peripheral em sleep (bateria). No link ativo (USB), é o caso
        #    errado de otimização.
        #
        # 3) gatt-client-notification-queue-size-4 → size-8 em rmk/Cargo.toml.
        #    Queue de 4 notifications GATT satura em rajada (>4 eventos
        #    key-down/up antes do central drenar) → key-up perdido = tecla
        #    travada. +200 B de RAM, throughput dobrado.
        #
        # 4) CONNECT_MUTEX cobrindo connect + setup HCI (central.rs) [V2].
        #    V1 segurava o CONNECT_MUTEX por apenas 3s de timer arbitrário
        #    após `central.connect()`. NÃO funcionou: o setup HCI pesado
        #    (GATT discovery + update_ble_phy + update_conn_params) acontece
        #    DEPOIS do drop do mutex, dentro de run_central_manager_task. O
        #    segundo manager, liberado do mutex, iniciava seu próprio setup
        #    em paralelo. Duas sequências HCI concorrentes no btdm ESP32-S3
        #    congelavam o host MESMO com ambos peripherals já "connected"
        #    no Link Layer — sintoma reportado pelo usuário após o commit V1.
        #    V2: CONNECT_MUTEX é segurado pelo caller E movido pra
        #    run_central_manager_task, que o dropa só ANTES do select3 do
        #    loop principal. Garante serialização de connect + GATT + PHY +
        #    conn_params entre managers. Remove happy path `try_lock`:
        #    sempre sinaliza STOP_SCANNING (ESP-IDF BLE multiconn guide
        #    confirma que stop-scan explícito é mandatório).
        #
        # Histórico de tentativas anteriores (não repetir):
        # - max_latency=0 + async_matrix ON + interval 7.5ms (7c47edb):
        #   peripheral dormia e não sustentava TX → disconnect loop.
        #   Com async_matrix OFF (HEAD atual), peripheral fica sempre
        #   acordado e aguenta responder em todo event → latency 0 passa
        #   a ser seguro.
        # - interval 15ms / latency 4 / supervision 30s (5ffc535):
        #   atenuou drops em sleep mas introduziu os ~2s de delay inicial.
        # - stagger `Timer::after_secs(peri_id * 5)` no início do manager:
        #   funciona como workaround mas não resolve re-conexões simultâneas
        #   após um drop (ambos tentam reconectar imediatamente). CONNECT_MUTEX
        #   resolve ambos os cenários.
        # - CONNECT_MUTEX V1 com 3s de settle arbitrário após connect:
        #   não cobria o setup HCI real (ver item 4 V2 acima).
        working-directory: .
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/HaoboGu/rmk.git /tmp/rmk-vendored
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          # --- Patch 1: central.rs — max_latency: N → 0 em todos os presets
          p = Path("/tmp/rmk-vendored/rmk/src/split/ble/central.rs")
          src = p.read_text()
          patched, count = re.subn(r"max_latency:\s*[1-9]\d*", "max_latency: 0", src)
          assert count >= 1, "Nenhum max_latency não-zero encontrado em central.rs — estrutura mudou"
          residual = re.findall(r"max_latency:\s*(\d+)", patched)
          non_zero = [v for v in residual if v != "0"]
          assert not non_zero, f"Sobraram max_latency não-zero: {non_zero}"
          p.write_text(patched)
          print(f"OK central.rs: {count} ocorrência(s) de max_latency: N → 0")

          # --- Patch 2: rmk/Cargo.toml — queue GATT 4 → 8
          cp = Path("/tmp/rmk-vendored/rmk/Cargo.toml")
          csrc = cp.read_text()
          needle = "gatt-client-notification-queue-size-4"
          assert needle in csrc, f"{needle} ausente em rmk/Cargo.toml"
          cp.write_text(csrc.replace(needle, "gatt-client-notification-queue-size-8"))
          print("OK Cargo.toml: gatt-client-notification-queue-size 4 → 8")

          # --- Patch 3: central.rs — CONNECT_MUTEX cobre connect + setup HCI completo
          #
          # V1 dessa correção (commit anterior) segurava o CONNECT_MUTEX só
          # por 3s de timer arbitrário após `central.connect()` retornar.
          # Isso NÃO funciona porque o setup HCI pesado (GATT discovery +
          # update_ble_phy + update_conn_params) acontece DEPOIS do drop do
          # mutex, dentro de `run_central_manager_task`. O segundo manager,
          # liberado do mutex, iniciava seu próprio setup em paralelo → duas
          # sequências de comandos HCI concorrentes no btdm do ESP32-S3
          # congelavam o host mesmo com ambos peripherals já em estado
          # "connected" no Link Layer.
          #
          # V2 (este patch): o CONNECT_MUTEX é segurado pelo CALLER até o
          # final do setup HCI, DENTRO de `run_central_manager_task`. Ou seja,
          # só é liberado ANTES do select3 do loop principal. Com isso:
          #   1) `central.connect()` serializado entre managers.
          #   2) `GattClient::new` (GATT discovery) serializado.
          #   3) `update_ble_phy` serializado.
          #   4) `update_conn_params` serializado.
          #   5) Só depois disso o segundo manager pode iniciar do passo 1.
          #
          # Também (herdado do V1): ESP-IDF BLE multiconn guide confirma
          # "Connect, scan and advertise can't occupy radio at the same time.
          # You MUST explicitly call the stop scanning function before
          # attempting to connect". Happy path `try_lock` do upstream removido;
          # sempre sinaliza STOP_SCANNING + espera SCANNING_MUTEX + 200ms.
          #
          # Custo: o 2º peripheral espera ~2-4s depois do 1º (tempo real
          # de setup HCI, não timer arbitrário) antes de começar seu próprio
          # connect. Invisível no uso humano.
          p2 = Path("/tmp/rmk-vendored/rmk/src/split/ble/central.rs")
          src2 = p2.read_text()

          # (3a) Adicionar import de MutexGuard (além de Mutex que já é importado).
          import_anchor = "use embassy_sync::mutex::Mutex;\n"
          import_replacement = "use embassy_sync::mutex::{Mutex, MutexGuard};\n"
          assert import_anchor in src2, "Import `use embassy_sync::mutex::Mutex;` não encontrado — upstream mudou"
          src2 = src2.replace(import_anchor, import_replacement, 1)

          # (3b) Inserir `static CONNECT_MUTEX` logo após `static SCANNING_MUTEX`.
          mutex_anchor = "static SCANNING_MUTEX: Mutex<crate::RawMutex, ()> = Mutex::new(());\n"
          mutex_insert = (
              "\n"
              "/// Serializes BLE central.connect() + initial GATT/PHY/conn_params\n"
              "/// setup across multiple peripheral managers. Patch injected by the\n"
              "/// rmk-keyboard-firmware CI (build-f2.yml) to fix concurrent-connect\n"
              "/// freeze on ESP32-S3 btdm controller. Held by the caller until\n"
              "/// run_central_manager_task finishes the initial HCI setup.\n"
              "static CONNECT_MUTEX: Mutex<crate::RawMutex, ()> = Mutex::new(());\n"
          )
          assert mutex_anchor in src2, "Âncora `static SCANNING_MUTEX` não encontrada — upstream mudou"
          assert "static CONNECT_MUTEX" not in src2, "CONNECT_MUTEX já existe no upstream — patch obsoleto"
          src2 = src2.replace(mutex_anchor, mutex_anchor + mutex_insert, 1)

          # (3c) Reescrever o call site: CONNECT_MUTEX é movido pra
          # run_central_manager_task em vez de dropado após timer arbitrário.
          old_caller = (
              "        // Connect to peripheral\n"
              "        match with_timeout(Duration::from_secs(5), async {\n"
              "            if let Ok(_guard) = SCANNING_MUTEX.try_lock() {\n"
              "                info!(\"Start connecting to peripheral {}\", peri_id);\n"
              "                central.connect(&config).await\n"
              "            } else {\n"
              "                STOP_SCANNING.signal(());\n"
              "                let _guard = SCANNING_MUTEX.lock().await;\n"
              "                // Wait a little bit to ensure that the scanning has been fully stopped\n"
              "                embassy_time::Timer::after_millis(100).await;\n"
              "                info!(\"Start connecting to peripheral {}\", peri_id);\n"
              "                central.connect(&config).await\n"
              "            }\n"
              "        })\n"
              "        .await\n"
              "        {\n"
              "            Ok(Ok(conn)) => {\n"
              "                info!(\"Connected to peripheral {}\", peri_id);\n"
              "\n"
              "                publish_event(PeripheralConnectedEvent {\n"
              "                    id: peri_id,\n"
              "                    connected: true,\n"
              "                });\n"
              "\n"
              "                if let Err(e) =\n"
              "                    run_central_manager_task::<_, _, ROW, COL, ROW_OFFSET, COL_OFFSET>(peri_id, stack, &conn).await\n"
              "                {\n"
              "                    #[cfg(feature = \"defmt\")]\n"
              "                    let e = defmt::Debug2Format(&e);\n"
              "                    error!(\"BLE central error: {:?}\", e);\n"
              "                }\n"
              "            }\n"
              "            Ok(Err(e)) => {\n"
              "                #[cfg(feature = \"defmt\")]\n"
              "                let e = defmt::Debug2Format(&e);\n"
              "                error!(\"Connect to peripheral {} error: {:?}\", peri_id, e);\n"
              "            }\n"
              "            Err(_) => {\n"
              "                // Connect to peripheral timeout\n"
              "                warn!(\"Connect to peripheral {} timeout, clearing\", peri_id);\n"
              "                if let Some(addr) = addrs.borrow_mut().get_mut(peri_id) {\n"
              "                    *addr = None\n"
              "                };\n"
              "            }\n"
              "        }\n"
          )
          new_caller = (
              "        // Patch CI rmk-keyboard-firmware (build-f2.yml):\n"
              "        // CONNECT_MUTEX é segurado durante connect E todo o setup HCI\n"
              "        // (GATT discovery + PHY + conn_params). Guard é movido pra\n"
              "        // run_central_manager_task, que o dropa antes do select3 do loop.\n"
              "        let connect_guard = CONNECT_MUTEX.lock().await;\n"
              "\n"
              "        // ESP32-S3 btdm REQUER stop scan explícito antes de connect.\n"
              "        // Happy path `try_lock` do upstream removido — sempre sinaliza stop.\n"
              "        STOP_SCANNING.signal(());\n"
              "        let _scan_guard = SCANNING_MUTEX.lock().await;\n"
              "        embassy_time::Timer::after_millis(200).await;\n"
              "        info!(\"Start connecting to peripheral {}\", peri_id);\n"
              "\n"
              "        // Connect to peripheral\n"
              "        match with_timeout(Duration::from_secs(5), central.connect(&config)).await {\n"
              "            Ok(Ok(conn)) => {\n"
              "                info!(\"Connected to peripheral {}\", peri_id);\n"
              "\n"
              "                publish_event(PeripheralConnectedEvent {\n"
              "                    id: peri_id,\n"
              "                    connected: true,\n"
              "                });\n"
              "\n"
              "                // scan_guard pode ser liberado aqui — connect já terminou\n"
              "                // no ar. Scanner volta a rodar pro próximo peripheral ser\n"
              "                // descoberto em paralelo com o setup HCI desta conexão.\n"
              "                drop(_scan_guard);\n"
              "\n"
              "                // connect_guard é movido pra função; ela dropa antes do select3.\n"
              "                if let Err(e) =\n"
              "                    run_central_manager_task::<_, _, ROW, COL, ROW_OFFSET, COL_OFFSET>(\n"
              "                        peri_id, stack, &conn, connect_guard,\n"
              "                    )\n"
              "                    .await\n"
              "                {\n"
              "                    #[cfg(feature = \"defmt\")]\n"
              "                    let e = defmt::Debug2Format(&e);\n"
              "                    error!(\"BLE central error: {:?}\", e);\n"
              "                }\n"
              "            }\n"
              "            Ok(Err(e)) => {\n"
              "                #[cfg(feature = \"defmt\")]\n"
              "                let e = defmt::Debug2Format(&e);\n"
              "                error!(\"Connect to peripheral {} error: {:?}\", peri_id, e);\n"
              "            }\n"
              "            Err(_) => {\n"
              "                // Connect to peripheral timeout\n"
              "                warn!(\"Connect to peripheral {} timeout, clearing\", peri_id);\n"
              "                if let Some(addr) = addrs.borrow_mut().get_mut(peri_id) {\n"
              "                    *addr = None\n"
              "                };\n"
              "            }\n"
              "        }\n"
          )
          assert old_caller in src2, "Padrão do match with_timeout/connect não encontrado — upstream mudou"
          src2 = src2.replace(old_caller, new_caller)

          # (3d) Reescrever run_central_manager_task: aceita `connect_guard` e
          # dropa antes do select3. Match do corpo inteiro da função pra
          # garantir unicidade (outras fns têm assinaturas parecidas).
          old_fn = (
              "async fn run_central_manager_task<\n"
              "    'a,\n"
              "    C: Controller + ControllerCmdAsync<LeSetPhy> + ControllerCmdSync<LeReadLocalSupportedFeatures>,\n"
              "    P: PacketPool,\n"
              "    const ROW: usize,\n"
              "    const COL: usize,\n"
              "    const ROW_OFFSET: usize,\n"
              "    const COL_OFFSET: usize,\n"
              ">(\n"
              "    id: usize,\n"
              "    stack: &'a Stack<'a, C, P>,\n"
              "    conn: &Connection<'a, P>,\n"
              ") -> Result<(), BleHostError<C::Error>> {\n"
              "    let client = GattClient::<C, P, 10>::new(stack, conn).await?;\n"
              "\n"
              "    // Use 2M Phy\n"
              "    update_ble_phy(stack, conn).await;\n"
              "\n"
              "    info!(\"Updating connection parameters for peripheral\");\n"
              "    update_conn_params(stack, conn, &defaul_central_conn_param()).await;\n"
              "\n"
              "    match select3(\n"
              "        ble_central_task(&client, conn),\n"
              "        run_peripheral_manager::<_, _, ROW, COL, ROW_OFFSET, COL_OFFSET>(id, &client),\n"
              "        sleep_manager_task(stack, conn),\n"
              "    )\n"
              "    .await\n"
              "    {\n"
              "        Either3::First(e) => e,\n"
              "        Either3::Second(e) => e,\n"
              "        Either3::Third(e) => e,\n"
              "    }\n"
              "}\n"
          )
          new_fn = (
              "async fn run_central_manager_task<\n"
              "    'a,\n"
              "    C: Controller + ControllerCmdAsync<LeSetPhy> + ControllerCmdSync<LeReadLocalSupportedFeatures>,\n"
              "    P: PacketPool,\n"
              "    const ROW: usize,\n"
              "    const COL: usize,\n"
              "    const ROW_OFFSET: usize,\n"
              "    const COL_OFFSET: usize,\n"
              ">(\n"
              "    id: usize,\n"
              "    stack: &'a Stack<'a, C, P>,\n"
              "    conn: &Connection<'a, P>,\n"
              "    // Patch CI rmk-keyboard-firmware: guard segurado pelo caller durante\n"
              "    // setup HCI inicial (GATT+PHY+conn_params). Evita concorrência de\n"
              "    // setup entre peripherals no btdm controller do ESP32-S3.\n"
              "    connect_guard: MutexGuard<'_, crate::RawMutex, ()>,\n"
              ") -> Result<(), BleHostError<C::Error>> {\n"
              "    let client = GattClient::<C, P, 10>::new(stack, conn).await?;\n"
              "\n"
              "    // Use 2M Phy\n"
              "    update_ble_phy(stack, conn).await;\n"
              "\n"
              "    info!(\"Updating connection parameters for peripheral\");\n"
              "    update_conn_params(stack, conn, &defaul_central_conn_param()).await;\n"
              "\n"
              "    // Patch CI: setup HCI concluído — libera CONNECT_MUTEX para o próximo\n"
              "    // peripheral iniciar seu próprio connect+setup sem colidir no controller.\n"
              "    drop(connect_guard);\n"
              "\n"
              "    match select3(\n"
              "        ble_central_task(&client, conn),\n"
              "        run_peripheral_manager::<_, _, ROW, COL, ROW_OFFSET, COL_OFFSET>(id, &client),\n"
              "        sleep_manager_task(stack, conn),\n"
              "    )\n"
              "    .await\n"
              "    {\n"
              "        Either3::First(e) => e,\n"
              "        Either3::Second(e) => e,\n"
              "        Either3::Third(e) => e,\n"
              "    }\n"
              "}\n"
          )
          assert old_fn in src2, "Corpo de run_central_manager_task não encontrado — upstream mudou"
          src2 = src2.replace(old_fn, new_fn)

          p2.write_text(src2)
          print("OK central.rs: CONNECT_MUTEX cobre connect + setup HCI até antes do select3")
          PYEOF
          cat >> dongle/Cargo.toml <<'EOF'

          # Patch injetado pelo CI — NÃO commitar manualmente.
          [patch."https://github.com/HaoboGu/rmk"]
          rmk        = { path = "/tmp/rmk-vendored/rmk" }
          rmk-config = { path = "/tmp/rmk-vendored/rmk-config" }
          rmk-macro  = { path = "/tmp/rmk-vendored/rmk-macro" }
          rmk-types  = { path = "/tmp/rmk-vendored/rmk-types" }
          EOF

      - name: Build firmware (release)
        run: cargo build --release

      - name: Produce flashable image
        run: |
          espflash save-image \
            --chip esp32s3 \
            --merge \
            target/xtensa-esp32s3-none-elf/release/central \
            dongle.bin

      - name: Upload dongle.bin
        uses: actions/upload-artifact@v4
        with:
          name: dongle-f2-bin
          path: dongle/dongle.bin
