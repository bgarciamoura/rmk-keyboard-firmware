name: F2 — Build dongle (Rust/cargo)
#
# Workflow paralelo ao build.yml (F1 config-only). Ambos rodam em cada push
# enquanto F2 amadurece. Quando estável, o build.yml é substituído por este
# conteúdo e o build-f2.yml é removido.

on:
  workflow_dispatch:
  push:
    paths:
      - "dongle/**"
      - ".github/workflows/build-f2.yml"

jobs:
  build-dongle-f2:
    name: build-dongle (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dongle
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dongle -> target
          shared-key: esp32s3-f2
          cache-on-failure: true

      - name: Install ESP Xtensa toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          ldproxy: true
          default: true
          buildtargets: esp32s3

      - name: Install espflash
        run: cargo install espflash --locked

      - name: Vendor + patch RMK (latency=0 + queue GATT 8 + CONNECT_MUTEX)
        # Quatro correções no RMK upstream pra estabilidade do link split BLE
        # (sintomas anteriores: ~2s de latência inicial, teclas travadas,
        # drops intermitentes, e freeze total ao ligar ambos peripherals
        # simultaneamente).
        #
        # 1) max_latency: N → 0 em TODAS as ocorrências de central.rs
        #    (regex cobre os 3 presets: default, sleep-connected-to-host,
        #    sleep-advertising). ZMK best practice: slave_latency = 0 no
        #    link split — peripheral RMK não tem queue persistente e precisa
        #    enviar key events no próximo conn event. Latency > 0 força
        #    delay e o central interpreta como idle profundo, disparando
        #    ~2s de reconexão ao voltar atividade.
        #
        # 2) interval 7.5ms e supervision 5s ficam como upstream (default).
        #    Patch anterior (5ffc535) subia pra 15ms/30s, otimizando pro
        #    peripheral em sleep (bateria). No link ativo (USB), é o caso
        #    errado de otimização.
        #
        # 3) gatt-client-notification-queue-size-4 → size-8 em rmk/Cargo.toml.
        #    Queue de 4 notifications GATT satura em rajada (>4 eventos
        #    key-down/up antes do central drenar) → key-up perdido = tecla
        #    travada. +200 B de RAM, throughput dobrado.
        #
        # 4) CONNECT_MUTEX + sempre stop-scan antes de connect (central.rs).
        #    Root cause do freeze quando ambos peripherals ligam juntos:
        #    `SCANNING_MUTEX` original só cobria `central.connect()` em si;
        #    era liberado assim que connect retornava. Enquanto isso, o
        #    `run_central_manager_task` do primeiro peripheral ainda rodava
        #    GATT discovery + `update_ble_phy` + `update_conn_params` — e
        #    o segundo manager, livre do SCANNING_MUTEX, chamava seu próprio
        #    `central.connect()`. O controller btdm do ESP32-S3 NÃO suporta
        #    `HCI_LE_Create_Connection` concorrente com GATT/PHY/conn_params
        #    update em outra conexão → retorna Command Disallowed (0x0C)
        #    e trava a task do host, levando junto USB HID + display.
        #    Fix: novo `CONNECT_MUTEX` que cobre connect + 3s de settle
        #    (GATT+PHY+conn_params terminam bem dentro desse prazo). Também
        #    remove o happy path `try_lock` — SEMPRE sinaliza STOP_SCANNING
        #    e pega SCANNING_MUTEX, porque btdm rejeita connect com radio
        #    "ainda cheirando a scan" (ESP-IDF BLE multiconn guide docs).
        #
        # Histórico de tentativas anteriores (não repetir):
        # - max_latency=0 + async_matrix ON + interval 7.5ms (7c47edb):
        #   peripheral dormia e não sustentava TX → disconnect loop.
        #   Com async_matrix OFF (HEAD atual), peripheral fica sempre
        #   acordado e aguenta responder em todo event → latency 0 passa
        #   a ser seguro.
        # - interval 15ms / latency 4 / supervision 30s (5ffc535):
        #   atenuou drops em sleep mas introduziu os ~2s de delay inicial.
        # - stagger `Timer::after_secs(peri_id * 5)` no início do manager:
        #   funciona como workaround mas não resolve re-conexões simultâneas
        #   após um drop (ambos tentam reconectar imediatamente). CONNECT_MUTEX
        #   resolve ambos os cenários.
        working-directory: .
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/HaoboGu/rmk.git /tmp/rmk-vendored
          python3 - <<'PYEOF'
          import re
          from pathlib import Path

          # --- Patch 1: central.rs — max_latency: N → 0 em todos os presets
          p = Path("/tmp/rmk-vendored/rmk/src/split/ble/central.rs")
          src = p.read_text()
          patched, count = re.subn(r"max_latency:\s*[1-9]\d*", "max_latency: 0", src)
          assert count >= 1, "Nenhum max_latency não-zero encontrado em central.rs — estrutura mudou"
          residual = re.findall(r"max_latency:\s*(\d+)", patched)
          non_zero = [v for v in residual if v != "0"]
          assert not non_zero, f"Sobraram max_latency não-zero: {non_zero}"
          p.write_text(patched)
          print(f"OK central.rs: {count} ocorrência(s) de max_latency: N → 0")

          # --- Patch 2: rmk/Cargo.toml — queue GATT 4 → 8
          cp = Path("/tmp/rmk-vendored/rmk/Cargo.toml")
          csrc = cp.read_text()
          needle = "gatt-client-notification-queue-size-4"
          assert needle in csrc, f"{needle} ausente em rmk/Cargo.toml"
          cp.write_text(csrc.replace(needle, "gatt-client-notification-queue-size-8"))
          print("OK Cargo.toml: gatt-client-notification-queue-size 4 → 8")

          # --- Patch 3: central.rs — CONNECT_MUTEX + stop-scan sempre antes de connect
          #
          # Root cause do freeze quando ambos peripherals ligam juntos:
          # O `SCANNING_MUTEX` do upstream é liberado assim que `central.connect()`
          # retorna. Mas o `run_central_manager_task` subsequente ainda roda
          # GATT discovery + `update_ble_phy` + `update_conn_params` por ~1-2s.
          # Nesse intervalo, o outro manager, sem nada o bloqueando, chama seu
          # próprio `central.connect()`. O controller btdm do ESP32-S3 recebe
          # um segundo `HCI_LE_Create_Connection` com setup ainda em progresso
          # e retorna Command Disallowed (0x0C); trouble-host fica esperando
          # eternamente o `Connection_Complete` que nunca vem → deadlock do
          # executor Embassy → USB HID + display morrem junto.
          #
          # Também: ESP-IDF BLE multiconn guide (+ issue esp-idf#826) confirma
          # "Connect, scan and advertise can't occupy radio at the same time.
          # You MUST explicitly call the stop scanning function before attempting
          # to connect". O happy path `try_lock` do upstream pula stop-scan
          # quando o mutex está disponível, o que não garante que o scanner
          # interno do controller btdm terminou — ESP32-S3 rejeita.
          #
          # Fix combinado:
          # (a) Novo `CONNECT_MUTEX` serializa connect + setup inicial entre N
          #     managers concorrentes. Segurado por todo o `central.connect()`
          #     e mais 3s de settle depois (GATT+PHY+conn_params terminam bem
          #     dentro desse prazo).
          # (b) Remove o happy path do `try_lock`. SEMPRE sinaliza STOP_SCANNING
          #     e espera SCANNING_MUTEX + 200ms de settle antes do connect.
          # (c) SCANNING_MUTEX é liberado APÓS o settle de 3s — assim o scanner
          #     volta ao ar a tempo do próximo peripheral ser achado, mas não
          #     durante o setup do link recém-estabelecido.
          #
          # Custo: o 2º peripheral espera ~3-5s depois do 1º antes de seu
          # próprio connect. Invisível no uso humano (o usuário liga as duas
          # metades uma de cada vez mesmo).
          p2 = Path("/tmp/rmk-vendored/rmk/src/split/ble/central.rs")
          src2 = p2.read_text()

          # (1) Inserir `static CONNECT_MUTEX` logo após `static SCANNING_MUTEX`.
          mutex_anchor = "static SCANNING_MUTEX: Mutex<crate::RawMutex, ()> = Mutex::new(());\n"
          mutex_insert = (
              "\n"
              "/// Serializes BLE central.connect() + initial GATT/PHY/conn_params\n"
              "/// setup across multiple peripheral managers. Patch injected by the\n"
              "/// rmk-keyboard-firmware CI (build-f2.yml) to fix concurrent-connect\n"
              "/// freeze on ESP32-S3 btdm controller.\n"
              "static CONNECT_MUTEX: Mutex<crate::RawMutex, ()> = Mutex::new(());\n"
          )
          assert mutex_anchor in src2, "Âncora `static SCANNING_MUTEX` não encontrada — upstream mudou"
          assert "static CONNECT_MUTEX" not in src2, "CONNECT_MUTEX já existe no upstream — patch obsoleto"
          src2 = src2.replace(mutex_anchor, mutex_anchor + mutex_insert, 1)

          # (2) Reescrever o bloco try_lock/else + todo o `match with_timeout` que
          # contém a lógica de connect+run_central_manager_task, pra segurar o
          # CONNECT_MUTEX durante connect + 3s de settle.
          old = (
              "        // Connect to peripheral\n"
              "        match with_timeout(Duration::from_secs(5), async {\n"
              "            if let Ok(_guard) = SCANNING_MUTEX.try_lock() {\n"
              "                info!(\"Start connecting to peripheral {}\", peri_id);\n"
              "                central.connect(&config).await\n"
              "            } else {\n"
              "                STOP_SCANNING.signal(());\n"
              "                let _guard = SCANNING_MUTEX.lock().await;\n"
              "                // Wait a little bit to ensure that the scanning has been fully stopped\n"
              "                embassy_time::Timer::after_millis(100).await;\n"
              "                info!(\"Start connecting to peripheral {}\", peri_id);\n"
              "                central.connect(&config).await\n"
              "            }\n"
              "        })\n"
              "        .await\n"
              "        {\n"
              "            Ok(Ok(conn)) => {\n"
              "                info!(\"Connected to peripheral {}\", peri_id);\n"
              "\n"
              "                publish_event(PeripheralConnectedEvent {\n"
              "                    id: peri_id,\n"
              "                    connected: true,\n"
              "                });\n"
              "\n"
              "                if let Err(e) =\n"
              "                    run_central_manager_task::<_, _, ROW, COL, ROW_OFFSET, COL_OFFSET>(peri_id, stack, &conn).await\n"
              "                {\n"
              "                    #[cfg(feature = \"defmt\")]\n"
              "                    let e = defmt::Debug2Format(&e);\n"
              "                    error!(\"BLE central error: {:?}\", e);\n"
              "                }\n"
              "            }\n"
              "            Ok(Err(e)) => {\n"
              "                #[cfg(feature = \"defmt\")]\n"
              "                let e = defmt::Debug2Format(&e);\n"
              "                error!(\"Connect to peripheral {} error: {:?}\", peri_id, e);\n"
              "            }\n"
              "            Err(_) => {\n"
              "                // Connect to peripheral timeout\n"
              "                warn!(\"Connect to peripheral {} timeout, clearing\", peri_id);\n"
              "                if let Some(addr) = addrs.borrow_mut().get_mut(peri_id) {\n"
              "                    *addr = None\n"
              "                };\n"
              "            }\n"
              "        }\n"
          )
          new = (
              "        // Patch CI rmk-keyboard-firmware (build-f2.yml):\n"
              "        // CONNECT_MUTEX serializa connect+setup entre managers paralelos.\n"
              "        // Segura até 3s depois do connect retornar, tempo suficiente pra\n"
              "        // GATT discovery + update_ble_phy + update_conn_params terminarem\n"
              "        // em `run_central_manager_task` antes do próximo manager tentar connect.\n"
              "        let _connect_guard = CONNECT_MUTEX.lock().await;\n"
              "\n"
              "        // ESP32-S3 btdm REQUER stop scan explícito antes de connect.\n"
              "        // Happy path `try_lock` do upstream removido — sempre sinaliza stop.\n"
              "        STOP_SCANNING.signal(());\n"
              "        let _scan_guard = SCANNING_MUTEX.lock().await;\n"
              "        embassy_time::Timer::after_millis(200).await;\n"
              "        info!(\"Start connecting to peripheral {}\", peri_id);\n"
              "\n"
              "        // Connect to peripheral\n"
              "        match with_timeout(Duration::from_secs(5), central.connect(&config)).await {\n"
              "            Ok(Ok(conn)) => {\n"
              "                info!(\"Connected to peripheral {}\", peri_id);\n"
              "\n"
              "                publish_event(PeripheralConnectedEvent {\n"
              "                    id: peri_id,\n"
              "                    connected: true,\n"
              "                });\n"
              "\n"
              "                // Settle: GATT discovery + PHY + conn_params terminam aqui.\n"
              "                // Depois, libera ambos mutexes explicitamente — scanner volta\n"
              "                // ao ar pro próximo peripheral ser achado e próximo connect\n"
              "                // pode começar em outro manager.\n"
              "                embassy_time::Timer::after_millis(3000).await;\n"
              "                drop(_scan_guard);\n"
              "                drop(_connect_guard);\n"
              "\n"
              "                if let Err(e) =\n"
              "                    run_central_manager_task::<_, _, ROW, COL, ROW_OFFSET, COL_OFFSET>(peri_id, stack, &conn).await\n"
              "                {\n"
              "                    #[cfg(feature = \"defmt\")]\n"
              "                    let e = defmt::Debug2Format(&e);\n"
              "                    error!(\"BLE central error: {:?}\", e);\n"
              "                }\n"
              "            }\n"
              "            Ok(Err(e)) => {\n"
              "                #[cfg(feature = \"defmt\")]\n"
              "                let e = defmt::Debug2Format(&e);\n"
              "                error!(\"Connect to peripheral {} error: {:?}\", peri_id, e);\n"
              "            }\n"
              "            Err(_) => {\n"
              "                // Connect to peripheral timeout\n"
              "                warn!(\"Connect to peripheral {} timeout, clearing\", peri_id);\n"
              "                if let Some(addr) = addrs.borrow_mut().get_mut(peri_id) {\n"
              "                    *addr = None\n"
              "                };\n"
              "            }\n"
              "        }\n"
          )
          assert old in src2, "Padrão do match with_timeout/connect não encontrado — upstream mudou"
          src2 = src2.replace(old, new)

          p2.write_text(src2)
          print("OK central.rs: CONNECT_MUTEX + stop-scan forçado sempre antes de central.connect()")
          PYEOF
          cat >> dongle/Cargo.toml <<'EOF'

          # Patch injetado pelo CI — NÃO commitar manualmente.
          [patch."https://github.com/HaoboGu/rmk"]
          rmk        = { path = "/tmp/rmk-vendored/rmk" }
          rmk-config = { path = "/tmp/rmk-vendored/rmk-config" }
          rmk-macro  = { path = "/tmp/rmk-vendored/rmk-macro" }
          rmk-types  = { path = "/tmp/rmk-vendored/rmk-types" }
          EOF

      - name: Build firmware (release)
        run: cargo build --release

      - name: Produce flashable image
        run: |
          espflash save-image \
            --chip esp32s3 \
            --merge \
            target/xtensa-esp32s3-none-elf/release/central \
            dongle.bin

      - name: Upload dongle.bin
        uses: actions/upload-artifact@v4
        with:
          name: dongle-f2-bin
          path: dongle/dongle.bin
